<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>区域占用检测面板</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="header">
    <h1>区域占用检测前端面板</h1>
    <div class="backend" id="backendInfo">后端地址：未连接</div>
  </div>

  <div class="container">
    <div class="panel">
      <div class="panel-title">实时视频</div>
      <div class="panel-body">
        <div class="toolbar">
          <button id="connectBtn">连接后端</button>
          <button id="refreshBtn">刷新状态</button>
        </div>

        <div class="video-wrapper">
          <video id="video" autoplay playsinline muted></video>
          <div class="video-placeholder" id="videoPlaceholder">
            当前尚未建立视频连接
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">实时状态</div>
      <div class="panel-body">
        <div class="status-grid">
          <div class="card">
            <div class="card-label">运行模式</div>
            <div class="card-value" id="mock">-</div>
          </div>
          <div class="card">
            <div class="card-label">是否支持视频</div>
            <div class="card-value" id="supports_video">-</div>
          </div>
          <div class="card">
            <div class="card-label">当前状态</div>
            <div class="card-value" id="status">-</div>
          </div>
          <div class="card">
            <div class="card-label">区域是否有人</div>
            <div class="card-value" id="occupied">-</div>
          </div>
          <div class="card">
            <div class="card-label">当前人数</div>
            <div class="card-value" id="current_people">-</div>
          </div>
          <div class="card">
            <div class="card-label">占用时长（秒）</div>
            <div class="card-value" id="occupied_duration_sec">-</div>
          </div>
          <div class="card">
            <div class="card-label">今日累计占用（秒）</div>
            <div class="card-value" id="today_total_occupied_sec">-</div>
          </div>
          <div class="card">
            <div class="card-label">今日最大人数</div>
            <div class="card-value" id="max_people_today">-</div>
          </div>
          <div class="card">
            <div class="card-label">摄像头状态</div>
            <div class="card-value" id="camera_ok">-</div>
          </div>
          <div class="card">
            <div class="card-label">检测器状态</div>
            <div class="card-value" id="detector_ok">-</div>
          </div>
          <div class="card">
            <div class="card-label">服务状态</div>
            <div class="card-value" id="running">-</div>
          </div>
          <div class="card">
            <div class="card-label">最近帧时间</div>
            <div class="card-value" id="last_frame_time" style="font-size:15px;">-</div>
          </div>
          <div class="card" style="grid-column: 1 / -1;">
            <div class="card-label">最后错误</div>
            <div class="card-value" id="last_error" style="font-size:15px;">-</div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" style="grid-column: 1 / -1;">
      <div class="panel-title">最近事件</div>
      <div class="panel-body">
        <div class="list" id="eventsList">
          <div class="muted">暂无事件</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
