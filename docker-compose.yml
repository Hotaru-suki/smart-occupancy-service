services:
  redis:
    image: redis:latest
    container_name: redis-test
    ports:
      - "6379:6379"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql-test
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "test_db"
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password